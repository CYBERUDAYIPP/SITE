<!DOCTYPE html>
<html>
<head>
  <title>Watch Video</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>ACTRESS WIBE</h1>
</header>

<div style="padding:20px;">
  <video id="player" controls width="100%" height="500"></video>
</div>

<div class="ad">Ad Space</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const videoSrc = params.get("video");
  document.getElementById("player").src = videoSrc;
</script>

</body>
</html>
